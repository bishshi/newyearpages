<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>服务结束通知</title>
    <style>
        :root {
            --primary-color: #2c3e50;
            --accent-color: #e74c3c;
            --text-soft: #7f8c8d;
            --bg-color: #f8f9fa;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background-color: var(--bg-color);
            color: var(--primary-color);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }

        .container {
            max-width: 600px;
            padding: 40px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            margin: 20px;
        }

        .icon {
            font-size: 50px;
            margin-bottom: 20px;
        }

        h1 {
            font-size: 24px;
            margin-bottom: 10px;
            font-weight: 600;
        }

        p {
            line-height: 1.6;
            color: var(--text-soft);
            margin-bottom: 20px;
        }

        .divider {
            height: 1px;
            background: #eee;
            margin: 30px 0;
        }

        .notice-box {
            background-color: #fff5f5;
            border-left: 4px solid var(--accent-color);
            padding: 15px;
            text-align: left;
            margin-bottom: 30px;
        }

        .link-button {
            display: inline-block;
            padding: 12px 30px;
            background-color: var(--primary-color);
            color: white;
            text-decoration: none;
            border-radius: 25px;
            transition: transform 0.2s, background-color 0.2s;
        }

        .link-button:hover {
            background-color: #34495e;
            transform: translateY(-2px);
        }

        .footer-date {
            margin-top: 40px;
            font-size: 0.9em;
            color: #95a5a6;
        }

        .highlight {
            color: var(--accent-color);
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="icon">✨</div>
    <h1>服务已告一段落</h1>
    <p>感谢您一直以来的陪伴与支持。本阶段的服务现已正式结束。</p>

    <div class="notice-box">
        <strong>内容迁移提示：</strong><br>
        为了方便查阅，原有的服务内容已悉数迁移至网站的 <span class="highlight">/2026</span> 目录下。
    </div>

    <a href="/2026" class="link-button">访问 2026 存档内容</a>

    <div class="divider"></div>

    <p>我们正在积蓄能量，期待为您带来更好的体验。</p>
    <p>下次服务预计开启时间：<br>
        <span class="highlight" style="font-size: 1.2em;">2027年 农历新年</span>
    </p>

    <div class="footer-date">
        © 2026 站点管理中心
    </div>
</div>

</body>
</html>
